default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: microblog_development
  username: postgres
  password:
  host: localhost

test:
  <<: *default
  database: microblog_test
  username: postgres
  password:
  host: localhost

production:
  <<: *default
  database: microblog_production
  username: microblog
  password: <%= ENV["MICROBLOG_DATABASE_PASSWORD"] %>
  host: localhost